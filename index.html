<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мониторинг контрагентов</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        :root {
            --bg: #f5f6f8; --white: #fff; --border: #e2e5eb;
            --text: #1a1a1a; --text2: #6b7280; --primary: #2563eb; --danger: #dc2626; --warning: #d97706; --success: #059669;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 13px; }
        .header { background: var(--white); border-bottom: 1px solid var(--border); padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; }
        .header-title { font-size: 15px; font-weight: 600; }
        .btn { padding: 7px 14px; border: none; border-radius: 5px; font-size: 12px; font-weight: 500; cursor: pointer; }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-primary:disabled { opacity: .4; cursor: not-allowed; }
        .stat { text-align: center; padding: 0 14px; border-left: 1px solid var(--border); }
        .stat:first-child { border-left: none; }
        .stat-value { font-size: 18px; font-weight: 700; }
        .stat-label { font-size: 10px; color: var(--text2); text-transform: uppercase; }
        .main { max-width: 100%; margin: 0 auto; padding: 20px 24px; }
        .layout { display: grid; grid-template-columns: 250px 1fr 300px; gap: 20px; }
        .card { background: var(--white); border: 1px solid var(--border); border-radius: 6px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
        .card-header { padding: 12px 16px; border-bottom: 1px solid var(--border); font-weight: 600; font-size: 13px; display: flex; justify-content: space-between; }
        .card-body { padding: 16px; }
        .input { width: 100%; padding: 7px 10px; border: 1px solid var(--border); border-radius: 5px; font-size: 13px; outline: none; }
        .input:focus { border-color: var(--primary); }
        .field { margin-bottom: 10px; }
        .field label { font-size: 11px; font-weight: 500; color: var(--text2); text-transform: uppercase; display: block; margin-bottom: 4px; }
        .toast { font-size: 11px; margin-top: 6px; }
        .toast-success { color: var(--success); } .toast-error { color: var(--danger); }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th { text-align: left; padding: 6px 8px; font-size: 10px; font-weight: 600; color: var(--text2); text-transform: uppercase; border-bottom: 2px solid var(--border); white-space: nowrap; }
        td { padding: 6px 8px; border-bottom: 1px solid #f0f1f3; vertical-align: top; }
        tr:hover td { background: #fafbfc; cursor: pointer; }
        .badge { display: inline-block; padding: 2px 6px; border-radius: 3px; font-size: 10px; font-weight: 500; }
        .badge-ok { background: #ecfdf5; color: var(--success); }
        .badge-warn { background: #fffbeb; color: var(--warning); }
        .badge-danger { background: #fef2f2; color: var(--danger); }
        .detail-row { background: #f9fafb; }
        .detail-row td { padding: 12px 16px; }
        .detail-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px 20px; font-size: 11px; }
        .detail-item { }
        .detail-label { color: var(--text2); font-size: 10px; text-transform: uppercase; }
        .detail-value { font-weight: 500; }
        .alert { padding: 2px 6px; border-radius: 3px; font-size: 10px; }
        .alert-danger { background: #fef2f2; color: var(--danger); }
        .alert-warning { background: #fffbeb; color: var(--warning); }
        .btn-delete { background: none; border: none; color: #9ca3af; cursor: pointer; padding: 4px 6px; border-radius: 4px; }
        .btn-delete:hover { color: #ef4444; background: #fef2f2; }
    </style>
</head>
<body x-data="app()" x-init="init()">
    
    <header class="header">
        <span class="header-title">Мониторинг контрагентов</span>
        <div style="display: flex; align-items: center;">
            <div class="stat"><div class="stat-value" x-text="contractors.length">0</div><div class="stat-label">всего</div></div>
            <div class="stat"><div class="stat-value" style="color:var(--danger);" x-text="riskCount()">0</div><div class="stat-label">с рисками</div></div>
        </div>
        <button class="btn btn-primary" @click="checkAll()" :disabled="isChecking || contractors.length === 0">
            Запустить проверку
        </button>
    </header>
    
    <main class="main">
        <div class="layout">
            <div>
                <div class="card">
                    <div class="card-header">Добавить</div>
                    <div class="card-body">
                        <div class="field">
                            <label>ИНН</label>
                            <input type="text" class="input" x-model="newInn" @keyup.enter="addContractor()" placeholder="10 или 12 цифр" maxlength="12">
                        </div>
                        <button class="btn btn-primary" style="width:100%;" @click="addContractor()" :disabled="!newInn || newInn.length < 10 || isAdding">
                            <span x-show="!isAdding">Добавить</span>
                            <span x-show="isAdding">Загрузка...</span>
                        </button>
                        <div class="toast toast-success" x-show="lastAdded" x-text="lastAdded"></div>
                        <div class="toast toast-error" x-show="lastError" x-text="lastError"></div>
                    </div>
                </div>
            </div>
            
            <div class="card" style="grid-column: span 2;">
                <div class="card-header">Контрагенты <span style="font-weight:400;color:var(--text2);" x-text="contractors.length"></span></div>
                <div style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>ИНН</th><th>Наименование</th><th>Выручка</th><th>Прибыль</th><th>Риск</th>
                                <th>ЕНС</th><th>Блокировка</th><th>Приостановка</th><th></th>
                            </tr>
                        </thead>
                        <tbody>
                            <template x-for="(c, idx) in contractors" :key="c.inn">
                                <tr>
                                    <td style="font-family:monospace;" x-text="c.inn"></td>
                                    <td @click="c.expanded = !c.expanded" style="cursor:pointer;">
                                        <span x-text="c.name || '—'"></span>
                                    </td>
                                    <td x-text="c.revenue || '—'"></td>
                                    <td x-text="c.profit || '—'"></td>
                                    <td><span class="badge" :class="c.risk < 30 ? 'badge-ok' : c.risk < 60 ? 'badge-warn' : 'badge-danger'" x-text="(c.risk||0)+'/100'"></span></td>
                                    <td><span x-show="c.ens_debt" class="alert alert-danger" x-text="c.ens_debt"></span><span x-show="!c.ens_debt">—</span></td>
                                    <td><span x-show="c.blocked" class="alert alert-danger">🔒 Да</span><span x-show="!c.blocked">—</span></td>
                                    <td><span x-show="c.suspended" class="alert alert-warning">⏸ Да</span><span x-show="!c.suspended">—</span></td>
                                    <td><button class="btn-delete" @click="removeContractor(idx)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></td>
                                </tr>
                                <tr x-show="c.expanded" class="detail-row">
                                    <td colspan="9">
                                        <div class="detail-grid">
                                            <div class="detail-item"><div class="detail-label">ОГРН</div><div class="detail-value" x-text="c.ogrn||'—'"></div></div>
                                            <div class="detail-item"><div class="detail-label">Дата регистрации</div><div class="detail-value" x-text="c.reg_date||'—'"></div></div>
                                            <div class="detail-item"><div class="detail-label">Статус</div><div class="detail-value" x-text="c.status||'—'"></div></div>
                                            <div class="detail-item"><div class="detail-label">Адрес</div><div class="detail-value" x-text="c.address||'—'"></div></div>
                                            <div class="detail-item"><div class="detail-label">Уставной капитал</div><div class="detail-value" x-text="c.capital||'—'"></div></div>
                                            <div class="detail-item"><div class="detail-label">ОКВЭД</div><div class="detail-value" x-text="c.okved||'—'"></div></div>
                                            <div class="detail-item"><div class="detail-label">Руководитель</div><div class="detail-value" x-text="c.director||'—'"></div></div>
                                            <div class="detail-item"><div class="detail-label">Массовый адрес</div><div class="detail-value" x-text="c.mass_addr ? '⚠️ Да' : 'Нет'"></div></div>
                                            <div class="detail-item"><div class="detail-label">Массовый руководитель</div><div class="detail-value" x-text="c.mass_dir ? '⚠️ Да' : 'Нет'"></div></div>
                                            <div class="detail-item"><div class="detail-label">Недостоверные сведения</div><div class="detail-value" x-text="c.unreliable ? '⚠️ Да' : 'Нет'"></div></div>
                                            <div class="detail-item"><div class="detail-label">Дисквалификация</div><div class="detail-value" x-text="c.disqualified ? '⚠️ Да' : 'Нет'"></div></div>
                                        </div>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
    
    <script>
        const API_URL = 'https://contractor-api-vv9f.onrender.com';
        
        function app() {
            return {
                newInn: '', lastAdded: '', lastError: '', isAdding: false,
                contractors: [], isChecking: false,
                
                init() {
                    const saved = localStorage.getItem('contractor_data_v2');
                    if (saved) this.contractors = JSON.parse(saved);
                },
                
                save() { localStorage.setItem('contractor_data_v2', JSON.stringify(this.contractors)); },
                
                async addContractor() {
                    const inn = this.newInn.trim();
                    if (!inn || inn.length < 10) return;
                    if (this.contractors.find(c => c.inn === inn)) { this.lastError = 'Уже в списке'; return; }
                    this.isAdding = true; this.lastError = '';
                    try {
                        const r = await fetch(`${API_URL}/api/check-company?inn=${inn}`);
                        const d = await r.json();
                        if (d.error) { this.lastError = d.error; }
                        else {
                            this.contractors.push({
                                inn, name: d.name, ogrn: d.ogrn, status: d.status, risk: d.risk,
                                address: d.address, revenue: d.revenue, profit: d.profit,
                                ens_debt: d.ens_debt, blocked: d.blocked, suspended: d.suspended,
                                reg_date: d.reg_date, capital: d.capital, okved: d.okved,
                                director: d.director, mass_addr: d.mass_addr, mass_dir: d.mass_dir,
                                unreliable: d.unreliable, disqualified: d.disqualified,
                                expanded: false
                            });
                            this.lastAdded = `✓ ${d.name}`; this.newInn = ''; this.save();
                        }
                    } catch (e) { this.lastError = 'Ошибка соединения'; }
                    this.isAdding = false;
                },
                
                removeContractor(idx) { this.contractors.splice(idx, 1); this.save(); },
                
                async checkAll() {
                    if (this.isChecking || !this.contractors.length) return;
                    this.isChecking = true;
                    for (let i = 0; i < this.contractors.length; i++) {
                        try {
                            const r = await fetch(`${API_URL}/api/check-company?inn=${this.contractors[i].inn}`);
                            const d = await r.json();
                            if (d.error) continue;
                            this.contractors[i].name = d.name;
                            this.contractors[i].risk = d.risk;
                            this.contractors[i].status = d.status;
                            this.contractors[i].revenue = d.revenue;
                            this.contractors[i].profit = d.profit;
                            this.contractors[i].ens_debt = d.ens_debt;
                            this.contractors[i].blocked = d.blocked;
                            this.contractors[i].suspended = d.suspended;
                            this.contractors[i].reg_date = d.reg_date;
                            this.contractors[i].capital = d.capital;
                            this.contractors[i].okved = d.okved;
                            this.contractors[i].director = d.director;
                            this.contractors[i].mass_addr = d.mass_addr;
                            this.contractors[i].mass_dir = d.mass_dir;
                            this.contractors[i].unreliable = d.unreliable;
                            this.contractors[i].disqualified = d.disqualified;
                        } catch (e) {}
                        await new Promise(r => setTimeout(r, 300));
                    }
                    this.isChecking = false;
                    this.save();
                },
                
                riskCount() { return this.contractors.filter(c => c.risk >= 60).length; }
            }
        }
    </script>
</body>
</html>
