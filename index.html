<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мониторинг контрагентов</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        :root { --bg: #f5f6f8; --white: #fff; --border: #e2e5eb; --text: #1a1a1a; --text2: #6b7280; --primary: #2563eb; --danger: #dc2626; --warning: #d97706; --success: #059669; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); font-size: 13px; }
        .header { background: var(--white); border-bottom: 1px solid var(--border); padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; }
        .header-title { font-size: 15px; font-weight: 600; }
        .btn { padding: 7px 14px; border: none; border-radius: 5px; font-size: 12px; font-weight: 500; cursor: pointer; }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-primary:disabled { opacity: .4; }
        .stat { text-align: center; padding: 0 14px; border-left: 1px solid var(--border); }
        .stat:first-child { border-left: none; }
        .stat-value { font-size: 18px; font-weight: 700; }
        .stat-label { font-size: 10px; color: var(--text2); text-transform: uppercase; }
        .main { max-width: 1400px; margin: 0 auto; padding: 20px 24px; }
        .layout { display: grid; grid-template-columns: 250px 1fr; gap: 20px; }
        .card { background: var(--white); border: 1px solid var(--border); border-radius: 6px; }
        .card-header { padding: 12px 16px; border-bottom: 1px solid var(--border); font-weight: 600; font-size: 13px; }
        .card-body { padding: 16px; }
        .input { width: 100%; padding: 7px 10px; border: 1px solid var(--border); border-radius: 5px; font-size: 13px; outline: none; }
        .input:focus { border-color: var(--primary); }
        .field { margin-bottom: 10px; }
        .field label { font-size: 11px; font-weight: 500; color: var(--text2); text-transform: uppercase; display: block; margin-bottom: 4px; }
        .toast-success { color: var(--success); font-size: 11px; margin-top: 6px; }
        .toast-error { color: var(--danger); font-size: 11px; margin-top: 6px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { text-align: left; padding: 8px 10px; font-size: 10px; font-weight: 600; color: var(--text2); text-transform: uppercase; border-bottom: 2px solid var(--border); }
        td { padding: 8px 10px; border-bottom: 1px solid #f0f1f3; }
        tr:hover td { background: #fafbfc; }
        .badge { display: inline-block; padding: 2px 7px; border-radius: 3px; font-size: 11px; font-weight: 500; }
        .badge-ok { background: #ecfdf5; color: var(--success); }
        .badge-warn { background: #fffbeb; color: var(--warning); }
        .badge-danger { background: #fef2f2; color: var(--danger); }
        .btn-delete { background: none; border: none; color: #9ca3af; cursor: pointer; padding: 4px 6px; border-radius: 4px; }
        .btn-delete:hover { color: #ef4444; }
    </style>
</head>
<body x-data="app()" x-init="init()">
    <header class="header">
        <span class="header-title">Мониторинг контрагентов</span>
        <div style="display: flex;">
            <div class="stat"><div class="stat-value" x-text="contractors.length">0</div><div class="stat-label">всего</div></div>
        </div>
        <button class="btn btn-primary" @click="checkAll()" :disabled="isChecking || contractors.length === 0">Запустить проверку</button>
    </header>
    <main class="main">
        <div class="layout">
            <div>
                <div class="card">
                    <div class="card-header">Добавить</div>
                    <div class="card-body">
                        <div class="field"><label>ИНН</label><input type="text" class="input" x-model="newInn" @keyup.enter="addContractor()" placeholder="10 или 12 цифр" maxlength="12"></div>
                        <button class="btn btn-primary" style="width:100%;" @click="addContractor()" :disabled="!newInn || newInn.length < 10 || isAdding">Добавить</button>
                        <div class="toast-success" x-show="lastAdded" x-text="lastAdded"></div>
                        <div class="toast-error" x-show="lastError" x-text="lastError"></div>
                    </div>
                </div>
            </div>
            <div class="card">
                <div class="card-header">Контрагенты</div>
                <table>
                    <thead><tr><th>ИНН</th><th>Название</th><th>Статус</th><th>Риск</th><th></th></tr></thead>
                    <tbody>
                        <template x-for="(c, idx) in contractors" :key="c.inn">
                            <tr>
                                <td style="font-family:monospace;" x-text="c.inn"></td>
                                <td x-text="c.name"></td>
                                <td x-text="c.status"></td>
                                <td><span class="badge" :class="c.risk < 30 ? 'badge-ok' : c.risk < 60 ? 'badge-warn' : 'badge-danger'" x-text="(c.risk||0)+'/100'"></span></td>
                                <td><button class="btn-delete" @click="removeContractor(idx)">✕</button></td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
    <script>
        const API_URL = 'https://contractor-api-vv9f.onrender.com';
        function app() {
            return {
                newInn: '', lastAdded: '', lastError: '', isAdding: false, contractors: [], isChecking: false,
                init() { const s = localStorage.getItem('cdata'); if (s) this.contractors = JSON.parse(s); },
                save() { localStorage.setItem('cdata', JSON.stringify(this.contractors)); },
                async addContractor() {
                    const inn = this.newInn.trim(); if (!inn || inn.length < 10) return;
                    if (this.contractors.find(c => c.inn === inn)) { this.lastError = 'Уже в списке'; return; }
                    this.isAdding = true; this.lastError = '';
                    try {
                        const r = await fetch(`${API_URL}/api/check-company?inn=${inn}`); const d = await r.json();
                        if (d.error) { this.lastError = d.error; }
                        else { this.contractors.push({ inn, name: d.name, status: d.status, risk: d.risk }); this.lastAdded = '✓ '+d.name; this.newInn = ''; this.save(); }
                    } catch (e) { this.lastError = 'Ошибка'; }
                    this.isAdding = false;
                },
                removeContractor(idx) { this.contractors.splice(idx, 1); this.save(); },
                async checkAll() {
                    if (this.isChecking || !this.contractors.length) return; this.isChecking = true;
                    for (let i = 0; i < this.contractors.length; i++) {
                        try {
                            const r = await fetch(`${API_URL}/api/check-company?inn=${this.contractors[i].inn}`); const d = await r.json();
                            if (!d.error) { this.contractors[i].name = d.name; this.contractors[i].status = d.status; this.contractors[i].risk = d.risk; }
                        } catch (e) {}
                        await new Promise(r => setTimeout(r, 300));
                    }
                    this.isChecking = false; this.save();
                }
            }
        }
    </script>
</body>
</html>
