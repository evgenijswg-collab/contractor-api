<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мониторинг контрагентов</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        :root { --bg: #f5f6f8; --white: #fff; --border: #e2e5eb; --text: #1a1a1a; --text2: #6b7280; --primary: #2563eb; --danger: #dc2626; --warning: #d97706; --success: #059669; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); font-size: 13px; }
        .header { background: var(--white); border-bottom: 1px solid var(--border); padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
        .header-title { font-size: 15px; font-weight: 600; }
        .btn { padding: 7px 14px; border: none; border-radius: 5px; font-size: 12px; font-weight: 500; cursor: pointer; }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-primary:disabled { opacity: .4; cursor: not-allowed; }
        .stat { text-align: center; padding: 0 14px; border-left: 1px solid var(--border); }
        .stat:first-child { border-left: none; }
        .stat-value { font-size: 18px; font-weight: 700; }
        .stat-label { font-size: 10px; color: var(--text2); text-transform: uppercase; }
        .stat-danger { color: var(--danger); }
        .stat-warning { color: var(--warning); }
        .main { max-width: 1400px; margin: 0 auto; padding: 20px 24px; }
        .layout { display: grid; grid-template-columns: 250px 1fr 300px; gap: 20px; align-items: start; }
        .card { background: var(--white); border: 1px solid var(--border); border-radius: 6px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
        .card-header { padding: 12px 16px; border-bottom: 1px solid var(--border); font-weight: 600; font-size: 13px; display: flex; justify-content: space-between; align-items: center; }
        .card-body { padding: 16px; }
        .input { width: 100%; padding: 7px 10px; border: 1px solid var(--border); border-radius: 5px; font-size: 13px; outline: none; }
        .input:focus { border-color: var(--primary); }
        .field { margin-bottom: 10px; }
        .field label { font-size: 11px; font-weight: 500; color: var(--text2); text-transform: uppercase; display: block; margin-bottom: 4px; }
        .toast { font-size: 11px; margin-top: 6px; }
        .toast-success { color: var(--success); } .toast-error { color: var(--danger); }
        .table-wrap { max-height: calc(100vh - 200px); overflow: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th { text-align: left; padding: 6px 8px; font-size: 10px; font-weight: 600; color: var(--text2); text-transform: uppercase; border-bottom: 2px solid var(--border); white-space: nowrap; position: sticky; top: 0; background: var(--white); }
        td { padding: 6px 8px; border-bottom: 1px solid #f0f1f3; }
        tr:hover td { background: #fafbfc; }
        .badge { display: inline-block; padding: 2px 6px; border-radius: 3px; font-size: 10px; font-weight: 500; }
        .badge-ok { background: #ecfdf5; color: var(--success); }
        .badge-warn { background: #fffbeb; color: var(--warning); }
        .badge-danger { background: #fef2f2; color: var(--danger); }
        .alert { display: inline-block; padding: 2px 6px; border-radius: 3px; font-size: 10px; font-weight: 500; }
        .alert-danger { background: #fef2f2; color: var(--danger); }
        .text-red { color: var(--danger); font-weight: 500; }
        .text-green { color: var(--success); font-weight: 500; }
        .btn-delete { background: none; border: none; color: #9ca3af; cursor: pointer; padding: 4px 6px; border-radius: 4px; }
        .btn-delete:hover { color: #ef4444; background: #fef2f2; }
        .anomaly-list { max-height: calc(100vh - 200px); overflow-y: auto; }
        .anomaly-item { padding: 10px 12px; border-left: 3px solid; margin-bottom: 6px; background: #fafbfc; border-radius: 0 4px 4px 0; font-size: 11px; }
        .anomaly-status { border-left-color: var(--danger); }
        .anomaly-risk { border-left-color: var(--warning); }
        .anomaly-block { border-left-color: #991b1b; background: #fef2f2; }
        .anomaly-date { color: var(--text2); margin-bottom: 2px; }
        .anomaly-name { font-weight: 600; font-size: 12px; margin-bottom: 2px; }
        .anomaly-desc { color: var(--text2); }
        .empty { text-align: center; padding: 24px; color: var(--text2); font-size: 12px; }
    </style>
</head>
<body x-data="app()" x-init="init()">
    
    <header class="header">
        <span class="header-title">Мониторинг контрагентов</span>
        <div style="display: flex;">
            <div class="stat"><div class="stat-value" x-text="contractors.length">0</div><div class="stat-label">всего</div></div>
            <div class="stat"><div class="stat-value stat-warning" x-text="riskCount()">0</div><div class="stat-label">риск</div></div>
            <div class="stat"><div class="stat-value stat-danger" x-text="anomalies.length">0</div><div class="stat-label">аномалий</div></div>
        </div>
        <button class="btn btn-primary" @click="checkAll()" :disabled="isChecking || contractors.length === 0">
            <span x-show="!isChecking">Запустить проверку</span>
            <span x-show="isChecking">⏳ Проверка...</span>
        </button>
    </header>
    
    <main class="main">
        <div class="layout">
            <div>
                <div class="card">
                    <div class="card-header">Добавить</div>
                    <div class="card-body">
                        <div class="field"><label>ИНН</label><input type="text" class="input" x-model="newInn" @keyup.enter="addContractor()" placeholder="10 или 12 цифр" maxlength="12"></div>
                        <button class="btn btn-primary" style="width:100%;" @click="addContractor()" :disabled="!newInn || newInn.length < 10 || isAdding">
                            <span x-show="!isAdding">Добавить</span><span x-show="isAdding">Загрузка...</span>
                        </button>
                        <div class="toast toast-success" x-show="lastAdded" x-text="lastAdded"></div>
                        <div class="toast toast-error" x-show="lastError" x-text="lastError"></div>
                    </div>
                </div>
            </div>
            
            <div class="card">
                <div class="card-header">Контрагенты <span style="font-weight:400;color:var(--text2);" x-text="contractors.length"></span></div>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>ИНН</th><th>Наименование</th><th>Статус</th><th>Выручка</th><th>Прибыль</th><th>Риск</th><th>ЕНС</th><th>Блокировка</th><th>Приостановка</th><th></th>
                            </tr>
                        </thead>
                        <tbody>
                            <template x-for="(c, idx) in contractors" :key="c.inn">
                                <tr>
                                    <td style="font-family:monospace;" x-text="c.inn"></td>
                                    <td x-text="c.name || '—'"></td>
                                    <td><span :class="c.status === 'Действующее' ? 'text-green' : 'text-red'" x-text="c.status || '—'"></span></td>
                                    <td x-text="c.revenue || '—'"></td>
                                    <td><span x-show="c.profit" :class="c.profit_raw < 0 ? 'text-red' : 'text-green'" x-text="c.profit"></span><span x-show="!c.profit">—</span></td>
                                    <td><span class="badge" :class="(c.risk||0) < 30 ? 'badge-ok' : (c.risk||0) < 60 ? 'badge-warn' : 'badge-danger'" x-text="(c.risk||0)+'/100'"></span></td>
                                    <td><span x-show="c.ens_debt" class="alert alert-danger" x-text="c.ens_debt"></span><span x-show="!c.ens_debt">—</span></td>
                                    <td><span x-show="c.blocked" class="alert alert-danger">🔒 Да</span><span x-show="!c.blocked">—</span></td>
                                    <td><span x-show="c.suspended" class="alert alert-danger">⏸ Да</span><span x-show="!c.suspended">—</span></td>
                                    <td><button class="btn-delete" @click="removeContractor(idx)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                    <div class="empty" x-show="contractors.length === 0">Нет контрагентов.</div>
                </div>
            </div>
            
            <div class="card">
                <div class="card-header" style="border-bottom-color: #fecaca;">⚠️ Аномалии<span x-show="anomalies.length" style="background:#fef2f2;color:var(--danger);padding:2px 8px;border-radius:10px;font-size:11px;" x-text="anomalies.length"></span></div>
                <div class="anomaly-list" x-show="anomalies.length" style="padding:10px 12px;">
                    <template x-for="a in anomalies.slice().reverse()" :key="a.date + a.inn + a.type">
                        <div class="anomaly-item" :class="a.type === 'STATUS' ? 'anomaly-status' : a.type === 'BLOCK' ? 'anomaly-block' : 'anomaly-risk'">
                            <div class="anomaly-date" x-text="a.date"></div>
                            <div class="anomaly-name" x-text="a.name"></div>
                            <div class="anomaly-desc" x-text="a.description"></div>
                        </div>
                    </template>
                </div>
                <div class="empty" x-show="!anomalies.length">Аномалий не обнаружено.</div>
            </div>
        </div>
    </main>
    
    <script>
        const API_URL = 'https://contractor-api-vv9f.onrender.com';
        
        function parseMoney(val) {
            if (!val) return null;
            const str = String(val).replace(/[^\d.-]/g, '');
            const num = parseFloat(str);
            if (isNaN(num)) return null;
            return num;
        }
        
        function formatMoney(val, isThousands = false) {
            let num = parseMoney(val);
            if (num === null) return null;
            if (isThousands) num = num * 1000;
            const abs = Math.abs(num);
            if (abs >= 1e6) return (num / 1e6).toFixed(0) + ' млн ₽';
            if (abs >= 1e3) return (num / 1e3).toFixed(0) + ' тыс ₽';
            return num.toLocaleString('ru-RU') + ' ₽';
        }
        
        function app() {
            return {
                newInn: '', lastAdded: '', lastError: '', isAdding: false,
                contractors: [], anomalies: [], isChecking: false,
                
                init() {
                    const saved = localStorage.getItem('cdata_v5');
                    if (saved) {
                        const data = JSON.parse(saved);
                        this.contractors = data.contractors || [];
                        this.anomalies = data.anomalies || [];
                    }
                },
                
                save() {
                    localStorage.setItem('cdata_v5', JSON.stringify({
                        contractors: this.contractors,
                        anomalies: this.anomalies
                    }));
                },
                
                async addContractor() {
                    const inn = this.newInn.trim();
                    if (!inn || inn.length < 10) return;
                    if (this.contractors.find(c => c.inn === inn)) { this.lastError = 'Уже в списке'; return; }
                    this.isAdding = true; this.lastError = '';
                    try {
                        const r = await fetch(`${API_URL}/api/check-company?inn=${inn}`);
                        const d = await r.json();
                        if (d.error) { this.lastError = d.error; }
                        else {
                            this.contractors.push({
                                inn, name: d.name, risk: d.risk, status: d.status,
                                revenue: formatMoney(d.revenue, true), revenue_raw: parseMoney(d.revenue),
                                profit: formatMoney(d.profit, true), profit_raw: parseMoney(d.profit),
                                ens_debt: formatMoney(d.ens_debt), blocked: d.blocked, suspended: d.suspended
                            });
                            this.lastAdded = '✓ ' + d.name; this.newInn = ''; this.save();
                        }
                    } catch (e) { this.lastError = 'Ошибка соединения'; }
                    this.isAdding = false;
                },
                
                removeContractor(idx) { this.contractors.splice(idx, 1); this.save(); },
                
                async checkAll() {
                    if (this.isChecking || !this.contractors.length) return;
                    this.isChecking = true;
                    
                    for (let i = 0; i < this.contractors.length; i++) {
                        try {
                            const r = await fetch(`${API_URL}/api/check-company?inn=${this.contractors[i].inn}`);
                            const d = await r.json();
                            if (d.error) continue;
                            
                            const prev = {
                                risk: this.contractors[i].risk,
                                status: this.contractors[i].status,
                                blocked: this.contractors[i].blocked,
                                ens_debt: this.contractors[i].ens_debt
                            };
                            
                            this.contractors[i].name = d.name;
                            this.contractors[i].risk = d.risk;
                            this.contractors[i].status = d.status;
                            this.contractors[i].revenue = formatMoney(d.revenue, true);
                            this.contractors[i].profit = formatMoney(d.profit, true);
                            this.contractors[i].profit_raw = parseMoney(d.profit);
                            this.contractors[i].ens_debt = formatMoney(d.ens_debt);
                            this.contractors[i].blocked = d.blocked;
                            this.contractors[i].suspended = d.suspended;
                            
                            const name = d.name;
                            const now = new Date().toLocaleString('ru-RU');
                            
                            if (prev.risk !== null && prev.risk > 0 && d.risk - prev.risk >= 15) {
                                this.anomalies.push({ date: now, inn: this.contractors[i].inn, name, type: 'RISK', description: `Риск вырос: ${prev.risk} → ${d.risk}` });
                            }
                            if (prev.blocked === false && d.blocked === true) {
                                this.anomalies.push({ date: now, inn: this.contractors[i].inn, name, type: 'BLOCK', description: 'Счета заблокированы!' });
                            }
                            if (!prev.ens_debt && d.ens_debt) {
                                this.anomalies.push({ date: now, inn: this.contractors[i].inn, name, type: 'RISK', description: 'Появилась задолженность по ЕНС' });
                            }
                        } catch (e) {}
                        await new Promise(r => setTimeout(r, 300));
                    }
                    this.isChecking = false;
                    this.save();
                },
                
                riskCount() { return this.contractors.filter(c => c.risk && c.risk >= 60).length; }
            }
        }
    </script>
</body>
</html>
